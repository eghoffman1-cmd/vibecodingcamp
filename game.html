<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mommy, Daddy, 3 Bathtubs Overflowed!</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Segoe UI', sans-serif;
    overflow: hidden;
  }
  canvas { display: block; border: 3px solid #00d4ff; box-shadow: 0 0 40px #00d4ff55; border-radius: 4px; }
  #ui {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex; justify-content: center; align-items: center;
    background: rgba(0,0,10,0.88);
    z-index: 10; flex-direction: column; gap: 18px;
  }
  #ui h1 { font-size: 2.8em; color: #00d4ff; text-shadow: 0 0 20px #00d4ff; text-align: center; line-height: 1.15; }
  #ui p { color: #aaa; font-size: 1em; text-align: center; max-width: 380px; }
  #nameInput {
    padding: 12px 20px; font-size: 1.3em;
    border: 2px solid #00d4ff; background: #001122; color: #fff;
    border-radius: 8px; outline: none; width: 260px; text-align: center;
  }
  #startBtn {
    padding: 13px 48px; font-size: 1.25em;
    background: linear-gradient(135deg, #00d4ff, #0066cc);
    color: #fff; border: none; border-radius: 8px; cursor: pointer;
    font-weight: bold; letter-spacing: 1px;
    transition: transform 0.1s, box-shadow 0.1s;
    box-shadow: 0 4px 20px #00d4ff44;
  }
  #startBtn:hover { transform: scale(1.05); box-shadow: 0 6px 30px #00d4ff88; }
  .level-steps { display: flex; gap: 10px; align-items: center; }
  .step {
    padding: 8px 18px; border-radius: 8px; font-weight: bold; font-size: 0.95em;
    color: #fff; opacity: 0.4;
  }
  .step.done { opacity: 1; }
  .step-arrow { color: #555; font-size: 1.2em; }
  #controls { color: #555; font-size: 0.88em; text-align: center; }
  .lvl-btn {
    padding: 12px 20px; font-size: 1em; border: 2px solid transparent;
    border-radius: 10px; cursor: pointer; font-weight: bold; color: #fff;
    transition: transform 0.1s, box-shadow 0.1s, border-color 0.15s;
    min-width: 110px; line-height: 1.5;
  }
  .lvl-btn:hover { transform: scale(1.06); }
  .lvl-btn.selected { border-color: #fff; box-shadow: 0 0 16px rgba(255,255,255,0.5); }
</style>
</head>
<body>
<div id="ui">
  <h1>🛁 MOMMY, DADDY,<br>3 BATHTUBS OVERFLOWED!</h1>
  <p>Survive all <strong style="color:#ff6">3 levels</strong> — Easy → Medium → Hard — to become the ultimate champion!</p>
  <input id="nameInput" type="text" placeholder="Enter your name..." maxlength="16" />
  <div style="display:flex;gap:12px;">
    <button class="lvl-btn" id="btn-easy"   onclick="setStart(0)" style="background:linear-gradient(135deg,#22bb55,#116622)">😊 Easy<br><small>15s • Slow water</small></button>
    <button class="lvl-btn" id="btn-medium" onclick="setStart(1)" style="background:linear-gradient(135deg,#ffaa00,#885500)">😤 Medium<br><small>12s • Faster water</small></button>
    <button class="lvl-btn" id="btn-hard"   onclick="setStart(2)" style="background:linear-gradient(135deg,#ff3333,#880011)">💀 Hard<br><small>15s • LAVA water</small></button>
  </div>
  <p style="color:#666;font-size:0.85em">Pick where to start — you'll still progress through remaining levels!</p>
  <button id="startBtn">PLAY!</button>
  <div id="controls">← → or A / D to move &nbsp;|&nbsp; Space or ↑ to jump (double jump!)</div>
</div>
<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const ui = document.getElementById('ui');
const nameInput = document.getElementById('nameInput');
const startBtn = document.getElementById('startBtn');

canvas.width = 600;
canvas.height = 500;

let playerName = 'Player';
let gameState = 'menu';
let audioCtx = null;
let currentLevelIndex = 0;
let startLevelIndex = 0;

function setStart(i) {
  startLevelIndex = i;
  document.querySelectorAll('.lvl-btn').forEach(b => b.classList.remove('selected'));
  document.getElementById(['btn-easy','btn-medium','btn-hard'][i]).classList.add('selected');
}
setTimeout(() => setStart(0), 0);

const LEVEL_ORDER = ['easy', 'medium', 'hard'];

const DIFFICULTIES = {
  easy: {
    label: 'Easy', emoji: '😊', time: 13,
    riseMultiplier: 0.85, accelerate: false,
    platforms: [
      { x: 0,   y: 455, w: 600, h: 14 },
      { x: 30,  y: 395, w: 150, h: 14 },
      { x: 230, y: 350, w: 140, h: 14 },
      { x: 420, y: 310, w: 140, h: 14 },
      { x: 60,  y: 265, w: 150, h: 14 },
      { x: 270, y: 225, w: 130, h: 14 },
      { x: 440, y: 185, w: 130, h: 14 },
      { x: 30,  y: 150, w: 150, h: 14 },
      { x: 220, y: 110, w: 160, h: 14 },
      { x: 420, y:  75, w: 150, h: 14 },
    ],
    color: '#22bb55',
    waterTop: 'rgba(0,220,180,0.85)', waterMid: 'rgba(0,120,180,0.9)',
  },
  medium: {
    label: 'Medium', emoji: '😤', time: 12,
    riseMultiplier: 1.0, accelerate: false,
    platforms: [
      { x: 0,   y: 455, w: 600, h: 14 },
      { x: 50,  y: 400, w: 120, h: 14 },
      { x: 220, y: 340, w: 100, h: 14 },
      { x: 380, y: 290, w: 110, h: 14 },
      { x: 100, y: 240, w: 130, h: 14 },
      { x: 310, y: 200, w: 100, h: 14 },
      { x: 50,  y: 160, w: 120, h: 14 },
      { x: 420, y: 140, w: 120, h: 14 },
      { x: 200, y: 100, w: 180, h: 14 },
    ],
    color: '#ffaa00',
    waterTop: 'rgba(0,200,255,0.85)', waterMid: 'rgba(0,100,220,0.9)',
  },
  hard: {
    label: 'Hard', emoji: '💀', time: 12,
    riseMultiplier: 1.1, accelerate: true,
    platforms: [
      { x: 0,   y: 455, w: 600, h: 14 },
      { x: 60,  y: 390, w: 120, h: 14 },
      { x: 260, y: 330, w: 110, h: 14 },
      { x: 410, y: 275, w: 120, h: 14 },
      { x: 80,  y: 225, w: 110, h: 14 },
      { x: 300, y: 180, w: 110, h: 14 },
      { x: 50,  y: 135, w: 120, h: 14 },
      { x: 400, y:  95, w: 120, h: 14 },
      { x: 190, y:  50, w: 140, h: 14 },
    ],
    color: '#ff3333',
    waterTop: 'rgba(255,80,0,0.85)', waterMid: 'rgba(180,20,0,0.9)',
  },
};

// ─── Audio ────────────────────────────────────────────────────────────────────
function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function playTone(freq, type, start, dur, vol=0.3, ac2=null) {
  const ac = ac2||getAudio();
  const osc=ac.createOscillator(), gain=ac.createGain();
  osc.connect(gain); gain.connect(ac.destination);
  osc.type=type; osc.frequency.setValueAtTime(freq, ac.currentTime+start);
  gain.gain.setValueAtTime(vol, ac.currentTime+start);
  gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime+start+dur);
  osc.start(ac.currentTime+start); osc.stop(ac.currentTime+start+dur+0.05);
}
function playWompWomp() {
  const ac=getAudio();
  [[400,0],[350,0.35],[300,0.70],[280,1.05],[260,1.20],[240,1.40]]
    .forEach(([f,t])=>playTone(f,'sawtooth',t,0.35,0.25,ac));
  const osc=ac.createOscillator(),lfo=ac.createOscillator(),lfoG=ac.createGain(),gain=ac.createGain();
  lfo.connect(lfoG); lfoG.connect(osc.frequency); osc.connect(gain); gain.connect(ac.destination);
  lfo.frequency.value=4; lfoG.gain.value=20; osc.type='sawtooth'; osc.frequency.value=180;
  gain.gain.setValueAtTime(0.15,ac.currentTime+1.6);
  gain.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+2.5);
  lfo.start(ac.currentTime+1.6); osc.start(ac.currentTime+1.6);
  lfo.stop(ac.currentTime+2.6); osc.stop(ac.currentTime+2.6);
}
function playLevelCompleteJingle() {
  // Short happy ding when a level is passed
  const ac=getAudio();
  [[523,0,0.12],[659,0.13,0.12],[784,0.26,0.25]].forEach(([f,t,d])=>playTone(f,'square',t,d,0.2,ac));
}
function playWinMusic() {
  const ac=getAudio();
  [[523,0.0,0.15],[523,0.15,0.15],[523,0.30,0.15],[659,0.45,0.40],
   [587,0.90,0.15],[523,1.05,0.15],[494,1.20,0.15],[659,1.40,0.60],
   [659,2.05,0.15],[622,2.20,0.15],[587,2.35,0.15],[554,2.55,0.15],
   [587,2.75,0.60],[415,3.40,0.20],[523,3.65,0.15],[494,3.85,0.15],
   [440,4.05,0.15],[523,4.25,0.60],[523,4.90,0.15],[659,5.10,0.60],[784,5.75,1.00]]
    .forEach(([f,t,d])=>playTone(f,'square',t,d,0.22,ac));
  [[392,0.45,0.40],[349,0.90,0.50],[392,1.40,0.60],[311,2.55,0.15],
   [349,2.75,0.60],[330,3.65,0.50],[392,4.25,0.60],[392,4.90,0.20],
   [494,5.10,0.60],[587,5.75,1.00]]
    .forEach(([f,t,d])=>playTone(f,'triangle',t,d,0.13,ac));
  [[131,0.0,0.40],[131,0.45,0.40],[98,0.90,0.50],[110,1.40,0.60],
   [123,2.05,0.50],[130,2.55,0.60],[98,3.40,0.80],[110,4.25,0.60],
   [131,4.90,0.30],[131,5.10,0.60],[131,5.75,1.00]]
    .forEach(([f,t,d])=>playTone(f,'sawtooth',t,d,0.18,ac));
}
function playJumpSound() {
  const ac=getAudio();
  const osc=ac.createOscillator(),gain=ac.createGain();
  osc.connect(gain); gain.connect(ac.destination); osc.type='sine';
  osc.frequency.setValueAtTime(200,ac.currentTime);
  osc.frequency.exponentialRampToValueAtTime(600,ac.currentTime+0.12);
  gain.gain.setValueAtTime(0.2,ac.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.15);
  osc.start(ac.currentTime); osc.stop(ac.currentTime+0.2);
}
function playBubbleSound() {
  const ac=getAudio();
  const osc=ac.createOscillator(),gain=ac.createGain();
  osc.connect(gain); gain.connect(ac.destination); osc.type='sine';
  const f=300+Math.random()*400;
  osc.frequency.setValueAtTime(f,ac.currentTime);
  osc.frequency.exponentialRampToValueAtTime(f*0.5,ac.currentTime+0.08);
  gain.gain.setValueAtTime(0.05,ac.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.1);
  osc.start(ac.currentTime); osc.stop(ac.currentTime+0.12);
}

// ─── Game State ───────────────────────────────────────────────────────────────
const GRAVITY=0.5, JUMP_FORCE=-12, SPEED=4;
let player, platforms, waterY, waterRiseRate, timer, totalTime, keys, bubbles, particles;
let winSoundPlayed, deathSoundPlayed, diffConfig, bubbleTimer, frame;
// 'levelwin' = brief between-level screen
// 'finalwin' = all three levels done

function initLevel(levelIndex) {
  currentLevelIndex = levelIndex;
  const key = LEVEL_ORDER[levelIndex];
  diffConfig = DIFFICULTIES[key];
  totalTime = diffConfig.time;
  player = { x: 270, y: 380, w: 32, h: 42, vx: 0, vy: 0, onGround: false, jumpsLeft: 2, facing: 1 };
  platforms = diffConfig.platforms.map(p=>({...p}));
  waterY = canvas.height + 20;
  waterRiseRate = (canvas.height + 20) / (totalTime * 60) * diffConfig.riseMultiplier;
  timer = totalTime;
  keys = {}; bubbles = []; particles = [];
  winSoundPlayed = false; deathSoundPlayed = false;
  bubbleTimer = 0; frame = 0;
  gameState = 'playing';
}

// ─── Input ────────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  keys[e.code] = true;
  if ((e.code==='Space'||e.code==='ArrowUp'||e.code==='KeyW') && gameState==='playing') {
    if (player.jumpsLeft>0) {
      player.vy=JUMP_FORCE; player.jumpsLeft--; player.onGround=false; playJumpSound();
    }
    e.preventDefault();
  }
  if (e.code==='Space') {
    if (gameState==='dead') initLevel(currentLevelIndex); // retry same level
    if (gameState==='levelwin') initLevel(currentLevelIndex+1); // next level
    if (gameState==='finalwin') { currentLevelIndex=startLevelIndex; initLevel(startLevelIndex); } // restart all
  }
});
document.addEventListener('keyup', e => { keys[e.code] = false; });

// ─── Physics ──────────────────────────────────────────────────────────────────
function updatePlayer(dt) {
  if (keys['ArrowLeft']||keys['KeyA']) { player.vx=-SPEED; player.facing=-1; }
  else if (keys['ArrowRight']||keys['KeyD']) { player.vx=SPEED; player.facing=1; }
  else player.vx=0;
  player.vy+=GRAVITY; player.x+=player.vx; player.y+=player.vy;
  player.onGround=false;
  for (const plat of platforms) {
    if (player.x+player.w>plat.x && player.x<plat.x+plat.w &&
        player.y+player.h>plat.y && player.y+player.h<plat.y+plat.h+Math.abs(player.vy)+1 &&
        player.vy>=0) {
      player.y=plat.y-player.h; player.vy=0; player.onGround=true; player.jumpsLeft=2;
    }
  }
  if (player.x+player.w<0) player.x=canvas.width;
  if (player.x>canvas.width) player.x=-player.w;
  if (player.y>canvas.height+100) triggerDeath();
}

function triggerDeath() {
  if (gameState!=='playing') return;
  gameState='dead';
  if (!deathSoundPlayed) { playWompWomp(); deathSoundPlayed=true; }
  spawnDeathParticles();
}

function triggerLevelWin() {
  if (gameState!=='playing') return;
  const isLast = currentLevelIndex === LEVEL_ORDER.length - 1;
  if (isLast) {
    gameState='finalwin';
    if (!winSoundPlayed) { playWinMusic(); winSoundPlayed=true; }
    spawnWinParticles();
  } else {
    gameState='levelwin';
    if (!winSoundPlayed) { playLevelCompleteJingle(); winSoundPlayed=true; }
    spawnWinParticles();
  }
}

// ─── Particles ────────────────────────────────────────────────────────────────
function spawnDeathParticles() {
  for (let i=0;i<40;i++) particles.push({
    x:player.x+player.w/2, y:player.y+player.h/2,
    vx:(Math.random()-0.5)*8, vy:(Math.random()-1.5)*8,
    life:1, color:`hsl(${Math.random()*30+200},80%,60%)`, r:Math.random()*6+2
  });
}
function spawnWinParticles() {
  for (let i=0;i<100;i++) particles.push({
    x:Math.random()*canvas.width, y:Math.random()*canvas.height,
    vx:(Math.random()-0.5)*6, vy:(Math.random()-2)*6,
    life:1, color:`hsl(${Math.random()*360},90%,65%)`, r:Math.random()*8+2
  });
}
function updateParticles() {
  for (let i=particles.length-1;i>=0;i--) {
    const p=particles[i];
    p.x+=p.vx; p.y+=p.vy; p.vy+=0.15; p.life-=0.018;
    if (p.life<=0) particles.splice(i,1);
  }
}

// ─── Bubbles ──────────────────────────────────────────────────────────────────
function updateBubbles() {
  bubbleTimer++;
  if (bubbleTimer%8===0) {
    bubbles.push({x:Math.random()*canvas.width,y:waterY+Math.random()*60,r:Math.random()*5+2,speed:Math.random()*1.5+0.5});
    if (Math.random()<0.1) playBubbleSound();
  }
  for (let i=bubbles.length-1;i>=0;i--) {
    bubbles[i].y-=bubbles[i].speed;
    if (bubbles[i].y<waterY-20) bubbles.splice(i,1);
  }
}

// ─── Drawing ──────────────────────────────────────────────────────────────────
function drawBackground() {
  const grad=ctx.createLinearGradient(0,0,0,canvas.height);
  grad.addColorStop(0,'#0a0a2e'); grad.addColorStop(1,'#001a0a');
  ctx.fillStyle=grad; ctx.fillRect(0,0,canvas.width,canvas.height);
  for (let i=0;i<40;i++) {
    const sx=(i*137.5+50)%canvas.width, sy=(i*97.3+30)%200;
    ctx.globalAlpha=0.3+0.7*Math.abs(Math.sin(frame*0.03+i));
    ctx.fillStyle='rgba(255,255,255,0.4)'; ctx.fillRect(sx,sy,1.5,1.5);
  }
  ctx.globalAlpha=1;
}

function drawPlatforms() {
  platforms.forEach(p=>{
    const grad=ctx.createLinearGradient(p.x,p.y,p.x,p.y+p.h);
    grad.addColorStop(0,'#8B5E3C'); grad.addColorStop(1,'#5C3D1A');
    ctx.fillStyle=grad; ctx.beginPath(); ctx.roundRect(p.x,p.y,p.w,p.h,4); ctx.fill();
    ctx.fillStyle='rgba(255,200,120,0.3)'; ctx.fillRect(p.x+4,p.y+2,p.w-8,3);
    ctx.fillStyle='#4a9e4a'; ctx.beginPath(); ctx.roundRect(p.x+2,p.y-4,p.w-4,7,3); ctx.fill();
  });
}

function drawWater() {
  ctx.save(); ctx.beginPath();
  ctx.moveTo(0,canvas.height);
  ctx.lineTo(0,waterY+Math.sin(frame*0.08)*8);
  for (let x=0;x<=canvas.width;x+=10) {
    const wave=Math.sin(x*0.04+frame*0.1)*10+Math.sin(x*0.07-frame*0.07)*5;
    ctx.lineTo(x,waterY+wave);
  }
  ctx.lineTo(canvas.width,waterY+Math.sin(frame*0.08)*8);
  ctx.lineTo(canvas.width,canvas.height); ctx.closePath();
  const wGrad=ctx.createLinearGradient(0,waterY,0,canvas.height);
  wGrad.addColorStop(0,diffConfig.waterTop);
  wGrad.addColorStop(0.3,diffConfig.waterMid);
  wGrad.addColorStop(1,'rgba(0,20,80,0.95)');
  ctx.fillStyle=wGrad; ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.15)'; ctx.lineWidth=1;
  for (let x=0;x<canvas.width;x+=20) {
    const wave=Math.sin(x*0.04+frame*0.1)*10+Math.sin(x*0.07-frame*0.07)*5;
    ctx.beginPath(); ctx.moveTo(x,waterY+wave); ctx.lineTo(x+10,waterY+wave+3); ctx.stroke();
  }
  ctx.restore();
  bubbles.forEach(b=>{
    if (b.y>waterY) return;
    ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,Math.PI*2);
    ctx.strokeStyle='rgba(180,240,255,0.7)'; ctx.lineWidth=1.5; ctx.stroke();
  });
}

function drawPlayer() {
  const px=player.x,py=player.y,pw=player.w,ph=player.h,cx=px+pw/2;
  ctx.save(); ctx.translate(cx,py+ph/2);
  if (player.facing===-1) ctx.scale(-1,1);
  ctx.fillStyle='#e8a050'; ctx.beginPath(); ctx.roundRect(-pw/2,-ph/2,pw,ph*0.55,6); ctx.fill();
  ctx.fillStyle='#3388ff'; ctx.beginPath(); ctx.roundRect(-pw/2,-ph/2+ph*0.25,pw,ph*0.35,[0,0,5,5]); ctx.fill();
  const legOff=gameState==='playing'&&(keys['ArrowLeft']||keys['KeyA']||keys['ArrowRight']||keys['KeyD'])?Math.sin(frame*0.3)*8:0;
  ctx.fillStyle='#224488';
  ctx.fillRect(-pw/2+2,ph*0.15,pw/2-3,ph*0.38+legOff);
  ctx.fillRect(2,ph*0.15,pw/2-3,ph*0.38-legOff);
  ctx.fillStyle='#111';
  ctx.beginPath(); ctx.roundRect(-pw/2,ph*0.38+legOff,pw/2-1,8,3); ctx.fill();
  ctx.beginPath(); ctx.roundRect(2,ph*0.38-legOff,pw/2-1,8,3); ctx.fill();
  ctx.fillStyle='#f5c085'; ctx.beginPath(); ctx.arc(0,-ph/2-8,13,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#333'; ctx.beginPath(); ctx.arc(4,-ph/2-9,2.5,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(5,-ph/2-10,1,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#5c3d1a'; ctx.beginPath(); ctx.ellipse(0,-ph/2-18,13,7,0,Math.PI,0); ctx.fill();
  ctx.restore();
  ctx.fillStyle='rgba(0,0,0,0.6)'; ctx.font='bold 11px Segoe UI';
  const nameW=ctx.measureText(playerName).width+10;
  ctx.fillRect(cx-nameW/2,py-36,nameW,18);
  ctx.fillStyle='#fff'; ctx.textAlign='center'; ctx.fillText(playerName,cx,py-22);
}

function drawProgressBar() {
  // Top-right level progress dots
  const levels = LEVEL_ORDER;
  ctx.font='bold 13px Segoe UI'; ctx.textAlign='right';
  let bx = canvas.width - 12;
  for (let i=levels.length-1;i>=0;i--) {
    const d=DIFFICULTIES[levels[i]];
    const done = i < currentLevelIndex;
    const active = i === currentLevelIndex;
    ctx.fillStyle=done?d.color+'cc':active?d.color:'#333';
    ctx.beginPath(); ctx.roundRect(bx-60,42,62,20,4); ctx.fill();
    ctx.fillStyle=done||active?'#fff':'#666';
    ctx.font='bold 11px Segoe UI'; ctx.textAlign='center';
    ctx.fillText((done?'✓ ':'')+d.label, bx-29, 56);
    bx -= 68;
  }
}

function drawHUD() {
  ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.fillRect(10,10,200,24);
  const frac=Math.max(0,timer/totalTime);
  ctx.fillStyle=frac>0.5?'#00ff88':frac>0.25?'#ffcc00':'#ff4444';
  ctx.fillRect(10,10,200*frac,24);
  ctx.strokeStyle='#fff'; ctx.lineWidth=1; ctx.strokeRect(10,10,200,24);
  ctx.fillStyle='#fff'; ctx.font='bold 13px Segoe UI'; ctx.textAlign='left';
  ctx.fillText(`⏱ Survive: ${Math.ceil(Math.max(0,timer))}s`, 16, 27);

  // current level badge
  ctx.fillStyle=diffConfig.color+'cc';
  ctx.beginPath(); ctx.roundRect(10,40,105,20,4); ctx.fill();
  ctx.fillStyle='#fff'; ctx.font='bold 11px Segoe UI'; ctx.textAlign='left';
  ctx.fillText(`${diffConfig.emoji} Level ${currentLevelIndex+1}/3: ${diffConfig.label}`, 14, 54);

  ctx.fillStyle='rgba(0,180,255,0.8)'; ctx.font='12px Segoe UI'; ctx.textAlign='right';
  ctx.fillText('🌊 BOILING WATER RISING!', canvas.width-10, 27);

  if (diffConfig.accelerate && gameState==='playing') {
    ctx.fillStyle='rgba(255,100,50,0.9)'; ctx.font='bold 11px Segoe UI'; ctx.textAlign='right';
    ctx.fillText('⚠ Water is ACCELERATING!', canvas.width-10, 47);
  }

  drawProgressBar();
}

function drawParticles() {
  particles.forEach(p=>{
    ctx.globalAlpha=p.life; ctx.fillStyle=p.color;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha=1;
}

function drawOverlay() {
  if (gameState==='dead') {
    ctx.fillStyle='rgba(0,0,30,0.75)'; ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.textAlign='center';
    ctx.fillStyle='#ff4444'; ctx.font='bold 60px Segoe UI';
    ctx.fillText('💀 YOU DIED! 💀', canvas.width/2, 175);
    ctx.fillStyle='#ff8888'; ctx.font='24px Segoe UI';
    ctx.fillText(`Too bad, ${playerName}...`, canvas.width/2, 222);
    ctx.fillStyle='#aaa'; ctx.font='20px Segoe UI';
    ctx.fillText('Womp womp womp 🎺', canvas.width/2, 256);
    ctx.fillStyle='#ffcc44'; ctx.font='16px Segoe UI';
    ctx.fillText(`Retry Level ${currentLevelIndex+1}: ${diffConfig.emoji} ${diffConfig.label}`, canvas.width/2, 290);
    ctx.fillStyle='#fff'; ctx.font='bold 20px Segoe UI';
    ctx.fillText('Press SPACE to try again', canvas.width/2, 332);
  }

  if (gameState==='levelwin') {
    const next=DIFFICULTIES[LEVEL_ORDER[currentLevelIndex+1]];
    ctx.fillStyle='rgba(0,20,0,0.78)'; ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.textAlign='center';
    ctx.fillStyle='#aaff88'; ctx.font='bold 52px Segoe UI';
    ctx.fillText(`✅ LEVEL ${currentLevelIndex+1} DONE!`, canvas.width/2, 175);
    ctx.fillStyle='#fff'; ctx.font='24px Segoe UI';
    ctx.fillText(`Great job, ${playerName}!`, canvas.width/2, 222);
    ctx.fillStyle='#ffdd55'; ctx.font='20px Segoe UI';
    ctx.fillText(`Next up: ${next.emoji} ${next.label}`, canvas.width/2, 260);
    ctx.fillStyle='#aaa'; ctx.font='16px Segoe UI';
    ctx.fillText(`Survive ${next.time} seconds of even worse water!`, canvas.width/2, 292);
    ctx.fillStyle='#fff'; ctx.font='bold 20px Segoe UI';
    ctx.fillText('Press SPACE to continue →', canvas.width/2, 336);
  }

  if (gameState==='finalwin') {
    ctx.fillStyle='rgba(0,5,0,0.78)'; ctx.fillRect(0,0,canvas.width,canvas.height);
    const glow=ctx.createRadialGradient(canvas.width/2,175,10,canvas.width/2,175,220);
    glow.addColorStop(0,'rgba(255,220,0,0.35)'); glow.addColorStop(1,'transparent');
    ctx.fillStyle=glow; ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.textAlign='center';
    ctx.fillStyle='#ffee00'; ctx.font='bold 54px Segoe UI';
    ctx.fillText('🏆 CHAMPION! 🏆', canvas.width/2, 168);
    ctx.fillStyle='#aaffaa'; ctx.font='26px Segoe UI';
    ctx.fillText(`${playerName} beat ALL 3 LEVELS!`, canvas.width/2, 215);
    ctx.fillStyle='#ffcc44'; ctx.font='20px Segoe UI';
    ctx.fillText('😊 Easy  →  😤 Medium  →  💀 Hard', canvas.width/2, 252);
    ctx.fillStyle='#88ff88'; ctx.font='18px Segoe UI';
    ctx.fillText('You survived the ultimate boiling water challenge! 🎉🔥', canvas.width/2, 285);
    ctx.fillStyle='#fff'; ctx.font='bold 20px Segoe UI';
    ctx.fillText('Press SPACE to play again from the start', canvas.width/2, 332);
  }
}

// ─── Main Loop ────────────────────────────────────────────────────────────────
let lastTime=null;
function loop(ts) {
  if (!lastTime) lastTime=ts;
  const dt=Math.min((ts-lastTime)/16.67,3);
  lastTime=ts; frame++;

  ctx.clearRect(0,0,canvas.width,canvas.height);
  drawBackground(); drawPlatforms();

  if (gameState==='playing') {
    updatePlayer(dt);
    const elapsed=totalTime-timer;
    const accel=diffConfig.accelerate?1+elapsed*0.03:1;
    waterY-=waterRiseRate*dt*accel;
    timer-=dt/60;
    updateBubbles(); updateParticles();
    if (player.y+player.h>waterY+5) triggerDeath();
    if (timer<=0) { timer=0; triggerLevelWin(); }
  } else {
    updateBubbles(); updateParticles();
  }

  drawWater(); drawPlayer(); drawParticles(); drawHUD(); drawOverlay();
  requestAnimationFrame(loop);
}

// ─── Start ────────────────────────────────────────────────────────────────────
startBtn.addEventListener('click', () => {
  playerName = nameInput.value.trim() || 'Player';
  ui.style.display = 'none';
  getAudio();
  currentLevelIndex = startLevelIndex;
  initLevel(startLevelIndex);
  requestAnimationFrame(loop);
});
nameInput.addEventListener('keydown', e => { if (e.key==='Enter') startBtn.click(); });
</script>
</body>
</html>
